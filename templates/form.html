<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đặt lịch MedDental</title>
  <script defer src="/static/script.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" />
</head>
<body class="bg-gray-50 text-gray-800">
  <div class="max-w-xl mx-auto p-4">
    <h1 class="text-2xl font-bold mb-4 text-center text-blue-800">Form Đặt Lịch Khám MedDental</h1>

    <form id="bookingForm" class="space-y-4">
      <input type="text" name="ten" placeholder="Họ và tên" required class="w-full p-2 border rounded">
      <input type="number" name="tuoi" placeholder="Tuổi" required class="w-full p-2 border rounded">
      <textarea name="benhly" placeholder="Bệnh lý..." required class="w-full p-2 border rounded"></textarea>

      <select name="diachi" required class="w-full p-2 border rounded">
        <option value="">Chọn cơ sở khám</option>
        <option value="CS1">CS1: 87 Bùi Thị Xuân</option>
        <option value="CS2">CS2: 03 Khuất Duy Tiến</option>
        <option value="CS3">CS3: 42 - 44 Nghĩa Dũng</option>
        <option value="CS5">CS5: 99 Trích Sài</option>
        <option value="CS6">CS6: KĐT Monbay Hạ Long</option>
      </select>

      <label class="block text-sm font-medium">Giờ gọi lại</label>
      <input type="time" name="gio_goilai" required class="w-full p-2 border rounded">

      <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded">Gửi thông tin</button>
    </form>

    <div id="popup" class="hidden text-green-600 font-bold mt-4 text-center">Đặt lịch thành công!</div>
  </div>
</body>
</html>
